name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  quality:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint (baseline: 13 known errors, 0 new errors allowed)
        run: |
          RESULT=$(npm run lint 2>&1 || true)
          echo "$RESULT"
          ERROR_COUNT=$(echo "$RESULT" | grep -oP '(\d+) error' | grep -oP '\d+' | head -1)
          echo "Error count: ${ERROR_COUNT:-0}"
          if [ "${ERROR_COUNT:-0}" -gt 13 ]; then
            echo "❌ New lint errors introduced! Baseline: 13, Found: $ERROR_COUNT"
            exit 1
          fi
          echo "✅ No new lint errors (baseline: 13, found: ${ERROR_COUNT:-0})"

      - name: TypeScript Check
        run: npx tsc --noEmit

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
